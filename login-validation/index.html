<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Authentication Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="tab-toggle-group">
                <button type="button" class="tab-btn active" id="toggle-login-tab">Sign In</button>
                <button type="button" class="tab-btn" id="toggle-reg-tab">Register</button>
            </div>

            <div id="status-banner" class="status-banner hidden"></div>

            <form id="login-form" class="auth-form" novalidate>
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="username" required>
                    <span class="error-msg">Please enter a valid email address</span>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
                    <span class="error-msg">Password must be at least 8 characters long</span>
                </div>

                <button type="submit" class="submit-btn">Sign In to Console</button>
            </form>
