<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <header class="card-header">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your console panel</p>
            </header>

            <div id="status-banner" class="status-banner hidden"></div>

            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="username" required>
                    <span class="error-msg" id="email-error">Please enter a valid email address</span>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                    <span class="error-msg" id="password-error">Password must be at least 8 characters long</span>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
